name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ secrets.VPS_DEPLOY_PATH }}

            echo "=== Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Build and deploy ==="
            sudo docker compose up -d --build

            echo "=== Cleanup old images ==="
            sudo docker image prune -af --filter "until=24h"

            echo "=== Health check ==="
            sleep 5
            curl -s -o /dev/null -w "Health check: %{http_code}\n" http://127.0.0.1:3000/ || true

            echo "=== Deploy finished ==="

      - name: Verify public URL
        run: |
          sleep 10
          curl -s -o /dev/null -w "Public status: %{http_code}\n" https://www.bantugrow.com/
