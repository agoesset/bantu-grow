services:
  bantugrow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bantugrow-app
    volumes:
      - bantugrow-data:/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/data/bantugrow.db
    restart: always
    networks:
      - mutabaah-digital_default

volumes:
  bantugrow-data:

networks:
  mutabaah-digital_default:
    external: true
