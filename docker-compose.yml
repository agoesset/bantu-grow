services:
  bantugrow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bantugrow-app
    ports:
      - '3000:3000'
    volumes:
      - bantugrow-data:/data
    environment:
      - DATABASE_PATH=/data/bantugrow.db
      - ADMIN_PASSWORD=admin
    restart: always

volumes:
  bantugrow-data:
